openapi: 3.0.0

info:
  title: Cubix API
  description: Backend APIs for Users, Modes, and Tasks
  version: 1.0.0

servers:
  - url: https://cubixbackend-production.up.railway.app

paths:
  # ================= AUTH =================

  /auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, userPassword]
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
      responses:
        200:
          description: Login success

  /auth/signUp:
    post:
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, userPassword, userName, userAge]
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
                userName:
                  type: string
                userAge:
                  type: number
      responses:
        201:
          description: User created

  # ================= USERS =================

  /users/getUserProfile/{userId}:
    get:
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success

  /users/updateUserProfile/{userId}:
    put:
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                age:
                  type: number
                profileImage:
                  type: string
                theme:
                  type: string
      responses:
        200:
          description: Updated

  # ================= MODES =================

  /modes/getUserModes:
    get:
      summary: Get user modes by email + platform
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
        - name: platform
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Modes list

  /modes/createMode:
    post:
      summary: Create mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, platform, name]
              properties:
                userId:
                  type: string
                platform:
                  type: string
                name:
                  type: string
                description:
                  type: string
                cubeFace:
                  type: number
                color:
                  type: string
                icon:
                  type: string
                energyLevel:
                  type: string
                focusRequired:
                  type: boolean
                category:
                  type: string
                blockedApps:
                  type: array
                  items:
                    type: string
                blockedWebsites:
                  type: array
                  items:
                    type: string
      responses:
        201:
          description: Mode created

  /modes/updateMode/{modeId}:
    put:
      summary: Update mode
      parameters:
        - name: modeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                color:
                  type: string
                icon:
                  type: string
                energyLevel:
                  type: string
                focusRequired:
                  type: boolean
                category:
                  type: string
                blockedApps:
                  type: array
                  items:
                    type: string
                blockedWebsites:
                  type: array
                  items:
                    type: string
                cubeFace:
                  type: number
      responses:
        200:
          description: Mode updated

  # ================= TASKS =================

  /tasks/getUserTasks:
    get:
      summary: Get user tasks by email
      parameters:
        - name: userEmail
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Tasks list

  /tasks/createTask:
    post:
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, modeId, name]
              properties:
                userId:
                  type: string
                modeId:
                  type: string
                name:
                  type: string
                description:
                  type: string
                duration:
                  type: number
                priority:
                  type: number
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                subtasks:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      completed:
                        type: boolean
      responses:
        201:
          description: Task created

  /tasks/updateTask/{taskId}:
    put:
      summary: Update task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                duration:
                  type: number
                priority:
                  type: number
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                status:
                  type: string
                progress:
                  type: number
                completed:
                  type: boolean
                pointsEarned:
                  type: number
      responses:
        200:
          description: Task updated

  /tasks/deleteTask/{taskId}:
    delete:
      summary: Delete task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task deleted

  /tasks/completeTask/{taskId}:
    put:
      summary: Complete task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pointsEarned:
                  type: number
      responses:
        200:
          description: Task completed

  # --- NEW TASK ENDPOINTS ---

  /tasks/startTask/{taskId}:
    put:
      summary: Start an active session for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task started successfully

  /tasks/pauseTask/{taskId}:
    put:
      summary: Pause an active session for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task paused successfully

  /tasks/summary:
    get:
      summary: Get top-level dashboard summary stats for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Returns totalPoints, efficiency, and completedTasks

  /tasks/heatmap:
    get:
      summary: Get task completion heatmap data for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Returns an array of dates and completion counts

  /tasks/timeline:
    get:
      summary: Get tasks for a specific date timeline
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: false
          description: Optional. Defaults to today if not provided (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        200:
          description: Returns chronologically sorted tasks for the timeline view

  /tasks/{taskId}/subtasks/{subtaskId}:
    put:
      summary: Toggle completion status of a specific subtask
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
        - name: subtaskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [completed]
              properties:
                completed:
                  type: boolean
      responses:
        200:
          description: Subtask boolean toggled successfully
