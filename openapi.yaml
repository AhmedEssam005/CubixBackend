openapi: 3.0.0

info:
  title: Cubix API
  description: Backend APIs for users, tasks, and modes
  version: 1.0.0

servers:
  - url: https://cubixbackend-production.up.railway.app

paths:
  # ================= AUTH =================
  /auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userEmail
                - userPassword
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
      responses:
        200:
          description: Login success

  /auth/signUp:
    post:
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userEmail
                - userPassword
                - userName
                - userAge
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
                userName:
                  type: string
                userAge:
                  type: number
      responses:
        201:
          description: User created

  # ================= USERS =================
  /users/getUserProfile/{userId}:
    get:
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success

  /users/updateUserProfile/{userId}:
    put:
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated

  # ================= MODES =================
  /modes/getUserModes:
    get:
      summary: Get user modes by email and platform
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
        - name: platform
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: List of modes

  /modes/createMode:
    post:
      summary: Create mode
      requestBody:
        required: true
      responses:
        201:
          description: Mode created

  /modes/updateMode/{modeId}:
    put:
      summary: Update mode
      parameters:
        - name: modeId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated

  # ================= TASKS =================
  /tasks/getUserTasks:
    get:
      summary: Get user tasks by email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Tasks list

  /tasks/createTask:
    post:
      summary: Create task
      responses:
        201:
          description: Task created

  /tasks/updateTask/{taskId}:
    put:
      summary: Update task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Updated

  /tasks/deleteTask/{taskId}:
    delete:
      summary: Delete task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Deleted

  /tasks/completeTask/{taskId}: 
    put:
      summary: Complete task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Completed
