openapi: 3.0.0

info:
  title: Cubix API
  description: Backend APIs for Users, Modes, and Tasks
  version: 1.0.0

servers:
  - url: https://cubixbackend-production.up.railway.app

paths:
  # ================= AUTH =================

  /auth/login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, userPassword]
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
      responses:
        200:
          description: Login success

  /auth/signUp:
    post:
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userEmail, userPassword, userName, userAge]
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
                userName:
                  type: string
                userAge:
                  type: number
      responses:
        201:
          description: User created

  # ================= USERS =================

  /users/getUserProfile/{userId}:
    get:
      summary: Get user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Success

  /users/updateUserProfile/{userId}:
    put:
      summary: Update user profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                age:
                  type: number
                profileImage:
                  type: string
                theme:
                  type: string
      responses:
        200:
          description: Updated

  # ================= MODES =================

  /modes/getUserModes:
    get:
      summary: Get user modes by email + platform
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
        - name: platform
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Modes list

  /modes/createMode:
    post:
      summary: Create mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, platform, name]
              properties:
                userId:
                  type: string
                platform:
                  type: string
                name:
                  type: string
                description:
                  type: string
                cubeFace:
                  type: number
                color:
                  type: string
                icon:
                  type: string
                energyLevel:
                  type: string
                focusRequired:
                  type: boolean
                category:
                  type: string
                blockedApps:
                  type: array
                  items:
                    type: string
                blockedWebsites:
                  type: array
                  items:
                    type: string
      responses:
        201:
          description: Mode created

  /modes/updateMode/{modeId}:
    put:
      summary: Update mode
      parameters:
        - name: modeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                color:
                  type: string
                icon:
                  type: string
                energyLevel:
                  type: string
                focusRequired:
                  type: boolean
                category:
                  type: string
                blockedApps:
                  type: array
                  items:
                    type: string
                blockedWebsites:
                  type: array
                  items:
                    type: string
                cubeFace:
                  type: number
      responses:
        200:
          description: Mode updated

  # ================= TASKS =================

  /tasks/getUserTasks:
    get:
      summary: Get user tasks by email
      parameters:
        - name: userEmail
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Tasks list

  /tasks/createTask:
    post:
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, modeId, name]
              properties:
                userId:
                  type: string
                modeId:
                  type: string
                name:
                  type: string
                description:
                  type: string
                duration:
                  type: number
                priority:
                  type: number
                startTime:
                  type: string
                endTime:
                  type: string
                subtasks:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      completed:
                        type: boolean
      responses:
        201:
          description: Task created

  /tasks/updateTask/{taskId}:
    put:
      summary: Update task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task updated

  /tasks/deleteTask/{taskId}:
    delete:
      summary: Delete task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task deleted

  /tasks/completeTask/{taskId}:
    put:
      summary: Complete task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pointsEarned:
                  type: number
      responses:
        200:
          description: Task completed
