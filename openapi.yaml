openapi: 3.0.0

info:
  title: Cubix API
  description: Backend APIs for users, tasks, and modes
  version: 1.0.0

servers:
  - url: https://cubixbackend-production.up.railway.app

paths:
  /login:
    post:
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userEmail
                - userPassword
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
            example:
              userEmail: "ahmed@example.com"
              userPassword: "123456"
      responses:
        200:
          description: Login success

  /signUp:
    post:
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userEmail
                - userPassword
                - userName
                - userAge
              properties:
                userEmail:
                  type: string
                userPassword:
                  type: string
                userName:
                  type: string
                userAge:
                  type: number
            example:
              userEmail: "test@gmail.com"
              userPassword: "123456"
              userName: "Ahmed"
              userAge: 20
      responses:
        200:
          description: User created

  /getUserModes:
    get:
      summary: Get user modes by email and platform
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string

        - name: platform
          in: query
          required: true
          schema:
            type: string

      responses:
        200:
          description: List of modes

  /getUserTasks:
    get:
      summary: Get user tasks by email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string

      responses:
        200:
          description: List of tasks

  /getAllTasks:
    get:
      summary: Get all tasks
      responses:
        200:
          description: Success

  /getAllUsers:
    get:
      summary: Get all users
      responses:
        200:
          description: Success
